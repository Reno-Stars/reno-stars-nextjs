name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test:run

      - name: Type check
        run: pnpm typecheck

      # Vercel GitHub Integration handles deployment automatically
      # No CLI or tokens needed - just connect repo in Vercel dashboard

  warm-image-cache:
    name: Warm Image CDN Cache
    runs-on: ubuntu-latest
    needs: test
    # Wait for Vercel to finish deploying before warming
    # Vercel typically deploys in 2-4 minutes after tests pass
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Wait for Vercel deployment
        run: sleep 120

      - name: Warm image CDN cache
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_BASE_URL: https://www.reno-stars.com
        run: pnpm warm:images
