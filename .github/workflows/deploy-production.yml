name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test:run

      - name: Type check
        run: pnpm typecheck

      # This workflow only tests/validates on push to main — it does NOT deploy.
      # Production is self-hosted (`next start` on a Mac via launchd
      # `com.renostars.reno-stars-web`, port 3000, behind a Cloudflare Tunnel).
      # Deploy is MANUAL on that machine: `git pull` on main → `pnpm build` →
      # `launchctl kickstart -k gui/$(id -u)/com.renostars.reno-stars-web`.
      # Merging a PR / pushing to main does NOT deploy. (Migrated off Vercel mid-2026.)

  # warm-image-cache is disabled — images are pre-processed to WebP at upload time
  # and served directly from R2. The /api/image route is only used as a fallback
  # for legacy URLs. Re-enable this job only if you add new raw images to R2.
